name: Android Debug Build

# Builds an installable debug APK on GitHub's runners and attaches it to the
# workflow run as a downloadable artifact. No signing secrets required -
# debug builds are self-signed by Gradle automatically, so this works out of
# the box on a fresh clone/fork.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + CMake
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager --install "ndk;28.0.13004108" "cmake;3.22.1" "platforms;android-36" "build-tools;36.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache native FetchContent deps (SDL3, zstd, FLAC, mpg123)
        uses: actions/cache@v4
        with:
          path: |
            android/app/.cxx
            **/_deps
          key: native-deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'cmake/**') }}
          restore-keys: |
            native-deps-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/28.0.13004108

      - name: Locate APK
        id: find_apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AmigaHunter-debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          if-no-files-found: error

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            android/app/build/outputs/logs/**
            android/app/.cxx/**/*.log
          if-no-files-found: ignore
